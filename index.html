<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>白云写字楼 - 免费预约带看</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen py-8 px-4">
  <div class="max-w-lg mx-auto">
    <!-- 头部 -->
    <div class="text-center mb-8">
      <h1 class="text-2xl font-bold text-gray-800 mb-2">🏢 白云写字楼预约带看</h1>
      <p class="text-gray-500 text-sm">填写信息，30分钟内专属顾问联系您</p>
    </div>

    <!-- 表单卡片 -->
    <div class="bg-white rounded-2xl shadow-xl p-6">
      <form id="leadForm">
        <div class="space-y-4">
          
          <!-- 姓名 -->
          <div>
            <label class="block text-sm text-gray-600 mb-1">您的称呼</label>
            <input 
              type="text" 
              id="name" 
              placeholder="如：张总"
              required
              class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
            >
          </div>

          <!-- 电话 -->
          <div>
            <label class="block text-sm text-gray-600 mb-1">联系电话 <span class="text-red-500">*</span></label>
            <input 
              type="tel" 
              id="phone" 
              placeholder="请输入手机号"
              required
              class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
            >
          </div>

          <!-- 需求面积 -->
          <div>
            <label class="block text-sm text-gray-600 mb-1">需求面积</label>
            <select 
              id="area" 
              class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
            >
              <option value="">请选择面积</option>
              <option value="50平以下">50平以下</option>
              <option value="50-100平">50-100平</option>
              <option value="100-200平">100-200平</option>
              <option value="200-300平">200-300平</option>
              <option value="300-500平">300-500平</option>
              <option value="500平以上">500平以上</option>
            </select>
          </div>

          <!-- 工位数量 -->
          <div>
            <label class="block text-sm text-gray-600 mb-1">工位数量</label>
            <select 
              id="workstations" 
              class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
            >
              <option value="">请选择工位</option>
              <option value="1-5人">1-5人</option>
              <option value="6-10人">6-10人</option>
              <option value="11-20人">11-20人</option>
              <option value="21-50人">21-50人</option>
              <option value="50人以上">50人以上</option>
            </select>
          </div>

          <!-- 隔断数量 -->
          <div>
            <label class="block text-sm text-gray-600 mb-1">隔断数量</label>
            <select 
              id="partitions" 
              class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
            >
              <option value="">请选择隔断</option>
              <option value="不需要隔断">不需要隔断</option>
              <option value="1个隔断">1个隔断</option>
              <option value="2个隔断">2个隔断</option>
              <option value="3个隔断">3个隔断</option>
              <option value="4个及以上">4个及以上</option>
            </select>
          </div>

          <!-- 公司业态 -->
          <div>
            <label class="block text-sm text-gray-600 mb-1">公司业态（选填）</label>
            <select 
              id="businessType" 
              class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
            >
              <option value="">请选择公司业态</option>
              <option value="科技互联网">科技互联网</option>
              <option value="贸易/进出口">贸易/进出口</option>
              <option value="律师/会计师事务所">律师/会计师事务所</option>
              <option value="咨询/管理培训">咨询/管理培训</option>
              <option value="金融/投资">金融/投资</option>
              <option value="文化传媒/广告">文化传媒/广告</option>
              <option value="医疗/健康">医疗/健康</option>
              <option value="教育/培训">教育/培训</option>
              <option value="房地产/建筑">房地产/建筑</option>
              <option value="其他行业">其他行业</option>
            </select>
          </div>

          <!-- 换房原因 -->
          <div>
            <label class="block text-sm text-gray-600 mb-1">换房原因（选填）</label>
            <select 
              id="reason" 
              class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
            >
              <option value="">请选择换房原因</option>
              <option value="公司扩张，面积不够">公司扩张，面积不够</option>
              <option value="租期到期，换环境">租期到期，换环境</option>
              <option value="房租太贵，想降本">房租太贵，想降本</option>
              <option value="地段不合适，交通不方便">地段不合适，交通不方便</option>
              <option value="办公环境不满意，想升级">办公环境不满意，想升级</option>
              <option value="公司缩编，面积太大">公司缩编，面积太大</option>
              <option value="其他原因">其他原因</option>
            </select>
          </div>

          <!-- 意向区域 -->
          <div>
            <label class="block text-sm text-gray-600 mb-1">意向区域（选填）</label>
            <select 
              id="region" 
              class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
            >
              <option value="">请选择意向区域</option>
              <option value="天河区">天河区</option>
              <option value="越秀区">越秀区</option>
              <option value="海珠区">海珠区</option>
              <option value="白云区">白云区</option>
              <option value="番禺区">番禺区</option>
              <option value="黄埔区">黄埔区</option>
              <option value="其他区域">其他区域</option>
            </select>
          </div>

          <!-- 提交按钮 -->
          <button 
            type="submit" 
            id="submitBtn"
            class="w-full bg-blue-500 hover:bg-blue-600 text-white font-medium py-4 rounded-xl transition-all duration-200 transform hover:scale-[1.02]"
          >
            免费预约带看
          </button>

        </div>
      </form>
    </div>

    <!-- 底部 -->
    <div class="text-center mt-6 text-gray-400 text-xs">
      <p>🔒 您的信息将严格保密</p>
    </div>
  </div>

  <script>
    const SENDKEY = 'SCT339077T2nj7iSqTglQccCg14lcGsl1t';

    document.getElementById('leadForm').addEventListener('submit', function(e) {
      e.preventDefault();
      
      const name = document.getElementById('name').value;
      const phone = document.getElementById('phone').value;
      const area = document.getElementById('area').value;
      const workstations = document.getElementById('workstations').value;
      const partitions = document.getElementById('partitions').value;
      const businessType = document.getElementById('businessType').value;
      const reason = document.getElementById('reason').value;
      const region = document.getElementById('region').value;

      const leadData = {
        name,
        phone,
        area,
        workstations,
        partitions,
        businessType,
        reason,
        region,
        time: new Date().toLocaleString()
      };

      console.log('🔥 新客户:', leadData);

      // ✅ 用图片方式发送，GET请求，100%成功，无跨域问题！
      const text = `新客户：${leadData.name} - ${leadData.phone}\n业态：${leadData.businessType || '未填写'}\n面积：${leadData.area || '未填写'}\n工位：${leadData.workstations || '未填写'}\n隔断：${leadData.partitions || '未填写'}\n换房原因：${leadData.reason || '未填写'}\n区域：${leadData.region || '未填写'}\n时间：${leadData.time}`;
      
      const img = new Image();
      img.src = `https://sctapi.ftqq.com/${SENDKEY}.send?title=🏢新客户预约&desp=${encodeURIComponent(text)}`;
      img.onload = img.onerror = function() {
        console.log('✅ 微信通知已发送');
      };

      // 成功提示
      document.getElementById('submitBtn').innerText = '提交成功！'
      document.getElementById('submitBtn').classList.remove('bg-blue-500');
      document.getElementById('submitBtn').classList.add('bg-green-500');
      
      setTimeout(() => {
        document.getElementById('leadForm').reset();
        document.getElementById('submitBtn').innerText = '免费预约带看';
        document.getElementById('submitBtn').classList.remove('bg-green-500');
        document.getElementById('submitBtn').classList.add('bg-blue-500');
      }, 2000);

    });
  </script>
</body>
</html>
