<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>客户管理后台</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
</head>
<body class="bg-gray-50 min-h-screen">
  <div class="max-w-6xl mx-auto px-4 py-8">
    
    <!-- 登录页 -->
    <div id="loginPage" class="max-w-md mx-auto mt-20">
      <div class="bg-white rounded-2xl shadow-lg p-8">
        <div class="text-center mb-6">
          <div class="inline-flex items-center justify-center w-16 h-16 bg-blue-600 rounded-full mb-4">
            <i class="fa fa-lock text-white text-2xl"></i>
          </div>
          <h1 class="text-2xl font-bold text-gray-800">客户管理后台</h1>
          <p class="text-gray-500 mt-2">请输入密码登录</p>
        </div>
        
        <div class="space-y-4">
          <input 
            type="password" 
            id="passwordInput" 
            placeholder="请输入密码"
            class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500"
            onkeypress="if(event.key==='Enter')login()"
          >
          <button 
            onclick="login()"
            class="w-full bg-blue-600 text-white py-3 rounded-xl font-semibold hover:bg-blue-700 transition"
          >
            登录
          </button>
        </div>
      </div>
    </div>

    <!-- 管理后台 -->
    <div id="adminPage" class="hidden">
      <div class="flex items-center justify-between mb-6">
        <div>
          <h1 class="text-2xl font-bold text-gray-800">📋 客户线索管理</h1>
          <p class="text-gray-500">所有客户预约信息</p>
        </div>
        <div class="flex gap-3">
          <button 
            onclick="exportExcel()" 
            class="bg-green-600 text-white px-4 py-2 rounded-lg hover:bg-green-700 transition"
          >
            <i class="fa fa-download mr-2"></i>导出Excel
          </button>
          <button 
            onclick="logout()" 
            class="bg-gray-500 text-white px-4 py-2 rounded-lg hover:bg-gray-600 transition"
          >
            退出
          </button>
        </div>
      </div>

      <!-- 统计卡片 -->
      <div class="grid grid-cols-4 gap-4 mb-6">
        <div class="bg-white rounded-xl p-4 shadow">
          <div class="text-3xl font-bold text-blue-600" id="totalCount">0</div>
          <div class="text-gray-500 text-sm">总客户数</div>
        </div>
        <div class="bg-white rounded-xl p-4 shadow">
          <div class="text-3xl font-bold text-yellow-600" id="pendingCount">0</div>
          <div class="text-gray-500 text-sm">待联系</div>
        </div>
        <div class="bg-white rounded-xl p-4 shadow">
          <div class="text-3xl font-bold text-blue-500" id="contactedCount">0</div>
          <div class="text-gray-500 text-sm">已联系</div>
        </div>
        <div class="bg-white rounded-xl p-4 shadow">
          <div class="text-3xl font-bold text-green-600" id="doneCount">0</div>
          <div class="text-gray-500 text-sm">已成交</div>
        </div>
      </div>

      <!-- 客户表格 -->
      <div class="bg-white rounded-xl shadow overflow-hidden">
        <table class="w-full">
          <thead class="bg-gray-50">
            <tr>
              <th class="px-4 py-3 text-left text-sm font-semibold text-gray-600">时间</th>
              <th class="px-4 py-3 text-left text-sm font-semibold text-gray-600">客户</th>
              <th class="px-4 py-3 text-left text-sm font-semibold text-gray-600">电话</th>
              <th class="px-4 py-3 text-left text-sm font-semibold text-gray-600">需求</th>
              <th class="px-4 py-3 text-left text-sm font-semibold text-gray-600">状态</th>
              <th class="px-4 py-3 text-left text-sm font-semibold text-gray-600">操作</th>
            </tr>
          </thead>
          <tbody id="leadsTable">
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    const statusColors = {
      '待联系': 'bg-yellow-100 text-yellow-800',
      '已联系': 'bg-blue-100 text-blue-800',
      '已带看': 'bg-purple-100 text-purple-800',
      '已成交': 'bg-green-100 text-green-800',
      '已放弃': 'bg-gray-100 text-gray-600'
    };

    function login() {
      const pwd = document.getElementById('passwordInput').value;
      fetch('/api/admin/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: pwd })
      }).then(r => r.json()).then(data => {
        if (data.success) {
          localStorage.setItem('admin_logged', '1');
          document.getElementById('loginPage').classList.add('hidden');
          document.getElementById('adminPage').classList.remove('hidden');
          loadLeads();
        } else {
          alert('密码错误');
        }
      });
    }

    function logout() {
      localStorage.removeItem('admin_logged');
      location.reload();
    }

    function loadLeads() {
      fetch('/api/admin/leads')
        .then(r => r.json())
        .then(leads => {
          renderLeads(leads);
          updateStats(leads);
        });
    }

    function renderLeads(leads) {
      const tbody = document.getElementById('leadsTable');
      tbody.innerHTML = leads.map(lead => `
        <tr class="border-t border-gray-100 hover:bg-gray-50">
          <td class="px-4 py-3 text-sm text-gray-500">${lead.time}</td>
          <td class="px-4 py-3 font-medium">${lead.name}</td>
          <td class="px-4 py-3">${lead.phone}</td>
          <td class="px-4 py-3 text-sm text-gray-600">
            ${lead.area || ''} ${lead.workstations || ''} ${lead.partitions || ''}
          </td>
          <td class="px-4 py-3">
            <select onchange="updateStatus(${lead.id}, this.value)" 
              class="px-2 py-1 rounded text-sm border-0 ${statusColors[lead.status] || ''}">
              <option value="待联系" ${lead.status === '待联系' ? 'selected' : ''}>待联系</option>
              <option value="已联系" ${lead.status === '已联系' ? 'selected' : ''}>已联系</option>
              <option value="已带看" ${lead.status === '已带看' ? 'selected' : ''}>已带看</option>
              <option value="已成交" ${lead.status === '已成交' ? 'selected' : ''}>已成交</option>
              <option value="已放弃" ${lead.status === '已放弃' ? 'selected' : ''}>已放弃</option>
            </select>
          </td>
          <td class="px-4 py-3">
            <button onclick="deleteLead(${lead.id})" class="text-red-500 hover:text-red-700">
              <i class="fa fa-trash"></i>
            </button>
          </td>
        </tr>
      `).join('');
    }

    function updateStats(leads) {
      document.getElementById('totalCount').textContent = leads.length;
      document.getElementById('pendingCount').textContent = leads.filter(l => l.status === '待联系').length;
      document.getElementById('contactedCount').textContent = leads.filter(l => l.status === '已联系' || l.status === '已带看').length;
      document.getElementById('doneCount').textContent = leads.filter(l => l.status === '已成交').length;
    }

    function updateStatus(id, status) {
      fetch(`/api/admin/leads/${id}/status`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ status })
      }).then(() => loadLeads());
    }

    function deleteLead(id) {
      if (confirm('确定删除这条客户记录？')) {
        fetch(`/api/admin/leads/${id}`, { method: 'DELETE' })
          .then(() => loadLeads());
      }
    }

    function exportExcel() {
      fetch('/api/admin/leads')
        .then(r => r.json())
        .then(leads => {
          const csv = [
            ['提交时间', '姓名', '电话', '面积', '工位', '隔断', '区域', '跟进状态'].join(','),
            ...leads.map(l => [l.time, l.name, l.phone, l.area, l.workstations, l.partitions, l.region || '', l.status].join(','))
          ].join('\n');
          
          const blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8' });
          const a = document.createElement('a');
          a.href = URL.createObjectURL(blob);
          a.download = `客户线索_${new Date().toLocaleDateString()}.csv`;
          a.click();
        });
    }

    // 页面加载时检查登录状态
    window.onload = function() {
      if (localStorage.getItem('admin_logged') === '1') {
        document.getElementById('loginPage').classList.add('hidden');
        document.getElementById('adminPage').classList.remove('hidden');
        loadLeads();
      }
    };
  </script>
</body>
</html>
